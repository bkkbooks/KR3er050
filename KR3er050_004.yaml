body:
  text: 卷下膀胱經第七是經起於睛明穴終於至陰穴膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小趾外側是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小趾不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也經絡解頭頂上為巔腦後為項肩後之下為肩膊椎骨為脊尻上橫骨為腰挾脊為膂挾腰髖骨兩旁為機機後為臀膝後屈處為膕股外為髀捷骨之下為髀樞腓腸為踹足太陽之脈受手太陽之交起目內眥睛明穴上額循攢竹過神庭歷曲差五處承光通天自通天斜行左右交於頂上之百會其支者從巔至百會抵耳上角以上一經脈一絡脈上行於頭者也其直行者由通天絡卻玉枕入絡腦復出下項以抵天柱又由天柱而下循肩膊內挾脊兩旁相去各一寸半下行於大杼風門諸俞由是抵腰中入循膂絡腎下屬膀胱其支別者從腰中循腰髖下挾脊歷上髎次髎中髎下髎會陽下貫臀至承扶殷門浮郄委陽入膕中之委中穴其支別者為挾脊兩旁第二行相去各三寸之諸穴自天柱而下從膊內左右別行下貫胛膂歷附分魄戶膏肓神堂譩譆膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊下歷尻臀過髀樞又循髀樞之裡承扶之外一寸五分之間而下與前之入膕中者相合下行循合陽下貫踹內歷承筋承山飛揚跗陽出外踝後之崑崙僕參申脈金門循京骨束骨通谷至小趾外側之至陰穴以交於足少陰腎經也膀胱經諸穴歌足太陽六十三睛明攢竹詣曲差五處之鄉承光通天見絡卻玉枕之行天柱高兮大杼抵風門開兮肺俞當厥陰心膈之俞肝膽脾胃之臟三焦腎兮大腸小腸膀胱俞兮中膂白環自從大杼至此去脊中寸半之旁又有上次中下四髎在腰四空以相將會陽居尻尾之側始了背中二行仍上肩胛而下附分二椎之旁三椎魄戶四椎膏肓神堂譩譆兮膈關魂門兮陽綱意舍兮胃倉肓門志室秩邊胞肓承扶浮郄與委陽殷門委中而合陽承筋承山到飛揚跗陽崑崙至僕參申脈金門探京骨之場束骨通谷抵至陰小趾之旁分寸歌足太陽兮膀胱經目內眥角始晴明眉頭陷中攢竹取曲差發際上五分五處發上一寸是承光發上二寸半通天絡卻玉枕穴相去寸五調勻看玉枕挾腦一寸三入發二寸枕骨現天柱陷後髮際中大筋外廉陷中獻自此挾脊開寸五第一大杼二風門三椎肺俞厥陰四心俞五椎之下論膈七肝九十膽俞十一脾俞十二胃十三三焦十四腎大腸十六之下椎小腸十八膀十九中膂內俞二十椎白環二十一椎下當以上諸穴可排之更有上次中下髎一二三四腰空好會陽陰尾尻骨旁背部二行諸穴了又從脊上開三寸第二椎下為附分三椎魄戶四膏肓第五椎下神堂尊第六譩譆膈關七第九魂門陽綱十十一意舍之穴存十二胃倉穴已分十三肓門端正在十四志室不須論十九胞肓二十秩邊背部三行諸穴勻又從臀下陰文取承扶居於陷中主浮郄扶下方六分委陽扶下寸六數殷門扶下六寸長膕中外廉兩筋鄉委中膝骨約紋里此下三寸尋合陽承筋腳跟上七寸穴在踹腸之中央承山踹下分肉間外踝七寸上飛揚跗陽外踝上三寸崑崙後跟陷中央僕參亦在踝骨下申脈踝下五分張金門申脈下一寸京骨外側骨際量束骨本節後陷中通谷節前陷中強至陰卻在小趾側太陽之穴始周詳病證解氣衝頭痛脈上額絡腦也目似脫脈起內眥也項如拔脈下項也脊痛脈挾脊也腰似折脈抵腰中也髀不可曲脈過髀樞也膕如結脈入膕中也踹如裂脈貫踹內也以上皆太陽經絡中病也痔脈貫臀也瘧兼少陽證也狂癲合陽維陽蹺兩經病也頭項痛脈上額入腦下項也目黃淚出脈起內眥也鼽衄內眥近鼻合陽明病也項背腰尻以下至小趾不用皆經脈所過之地以上或本經或合他經皆經病未及腑病也腑病載本草中本草臟腑虛實標本用藥式膀胱主津液為胞之府氣化乃能出號州都之官諸病皆干之本病臟腑之病小便淋瀝或短數或黃赤或白或遺失膀胱主小便諸病皆本腑病或氣痛本腑病標病經絡之病發熱惡寒太陽主表頭痛腰脊強同經鼻塞內眥近鼻足小趾不用同經治法解實熱瀉之膀胱主津液實熱則津液耗散瀉之所以救液也下一法泄火水不利則火無由泄行水所以泄火滑石淡滲濕寒瀉熱下走膀胱而行水豬苓除濕瀉熱下通膀胱下虛補之膀胱氣化乃出或熱或寒皆能傷氣氣虛則下焦不固故用補下分二法熱熱在下焦乃真水不足無陰則陽無以化宜滋腎與膀胱之陰知母潤腎燥而滋陰為氣分藥黃柏瀉膀胱火補腎水不足為血分藥寒虛寒則氣結於下或升或散皆所以通其氣虛寒則元氣不固或溫或澀皆所以固其氣桔梗開提氣血載藥上浮升麻能升陽氣於至陰之下益智仁澀精固氣縮小便烏藥辛溫順氣治膀胱冷氣萸肉固精秘氣縮小便本熱利之不言本寒者已見補虛條中省文也降火水在高源上焦有火則化源絕清金瀉火亦補母之義前虛熱條中所載乃正治法此乃隔一治法互文也至行水泄火惟實者宜之已見前瀉實條中與此條有別地黃苦寒瀉火入手足少陰梔子瀉心肺邪熱從小便出茵陳寒勝熱苦燥濕入足太陰經黃柏瀉相火補腎水丹皮入手足少陰瀉血中伏火地骨皮降肺中伏火標寒發之不言標熱者寒邪中下初入太陽猶未變為熱也發表太陽主表寒邪入表急宜驅之使出故發汗之法較解表尤重麻黃辛溫發汗去營中寒邪桂枝發汗解肌調和營衛羌活搜風勝濕入足太陽經防己通腠理療風水太陽經藥黃耆無汗能發有汗能止木賊草發汗解肌升散火鬱風濕蒼朮發汗除濕腎經第八是經起於湧泉穴終於俞府穴腎足少陰之脈起於小趾之下邪趨足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也經絡解足少陰腎之脈受足太陽膀胱之交起足小趾之下斜趨足心之湧泉轉出內踝前起大骨下之然骨下循內踝後之太谿別入跟中之大鐘照海水泉乃折自大鐘之外上循內踝行厥陰太陰兩經之後經本經復溜交信穴過脾經之三陰交上踹內循築賓出膕內廉抵陰谷上股內後廉貫脊會於督之長強還出於前循橫骨大赫氣穴四滿中注肓俞之所臍之左右屬腎下臍過任脈之關元中極而絡膀胱焉其直行者從肓俞屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊入肺中循神封靈墟神藏彧中俞府而上循喉嚨並人迎挾舌本而終其支者自神藏別出繞心注胸之膻中以交於手厥陰心包絡經也腎經諸穴歌足少陰兮二十七湧泉流於然谷太谿大鐘兮水泉綠照海復溜兮交信續從築賓兮上陰谷掩橫骨兮大赫麓氣穴四滿兮中注肓俞上通乎商曲守石關兮陰都安閉通谷兮幽門肅步廊神封而靈墟存神藏彧中而俞府足分寸歌足掌心中是湧泉然骨踝下一寸前太谿踝後跟骨上大鐘跟後踵中邊水泉溪下一寸覓照海踝下四寸安復溜跟上前二寸交信踝上二寸聯二穴止隔筋前後太陽之後少陰前築賓內踝上踹分陰谷膝下曲膝間橫骨大赫並氣穴四滿中注亦相連各開中行止半寸上下相去一寸便上膈肓俞亦一寸肓俞臍旁半寸邊肓俞商曲石關來陰都通谷幽門肅各開中行五分俠六穴上下一寸裁步廊神封靈墟存神藏彧中俞府尊各開中行計二寸上下寸六六穴分俞府璇璣旁二寸取之得法自然真病證解飢不欲食蓋虛火盛則飢而不欲食者脾氣弱也乃木火侮土之故以腎虛不能養肝且脈貫肝上膈也面如漆柴水枯而腎之色黑者見於外腎之主骨者瘦於形也咳唾有血喝喝而喘以脈入肺中皆火盛水虧之疾也坐而欲起皆陰虛不能安靜也目無所見水虧肝弱也心如懸脈絡心包也善恐如人將捕恐傷腎也骨厥腎主骨也口熱舌乾咽腫上氣嗌乾痛脈循喉嚨挾舌本也煩心心痛脈絡心也黃疸身體面目皆變黃也有急黃勞黃腦黃陰黃癖黃噤黃五色黃黃汗酒疸谷疸黑疸女勞疸名目不可不辨腸澼即滯下滯下即痢疾痢疾本於腎腎司二陰也脊股內後廉痛脈所經也痿骨痿腎主骨也厥腎虛氣上逆也嗜臥即傷寒論中所謂但欲寐蓋熱邪入腎則神昏而嗜臥也足下熱痛脈起湧泉也以上或臟病或經病而合他臟病居多以腎脈入肝入肺絡心一臟而連諸臟與他臟異也本草臟腑虛實標本用藥式腎藏智屬水為天一之源主聽主骨主二陰本病臟腑之病諸寒厥逆骨痿同經腰痛腰冷如水臟病及腑足䟰腫寒水氣下注少腹滿急疝瘕腎主下焦少腹腎所治也大便閉泄吐利腥穢水液澄澈清冷不禁腎主二陰消渴引飲火旺傷水標病經絡之病發熱不惡熱真寒假熱頭眩頭痛太陽經病腎絡所通咽痛舌燥脊股後廉痛同經命門右腎為命門為相火之原天地之始藏精精化於氣生血陽能生陰降則為漏升則為鉛鉛乃北方正氣一點初生之真陽一念之非降而為漏一念之誠守而為鉛主三焦元氣本病不言標病者兩腎經絡皆同也前後癃閉腎主二陰左腎病便閉右腎病癃閉有寒熱之分氣逆裡急疝痛奔豚病同左腎滿急疝瘕而有寒熱之別消渴亦同左腎而水虛火虛不同膏淋淋病屬小便而膏淋則傷精精漏精寒命門主藏精赤白濁亦精道病溺血崩中帶漏命門主生血治法解水強瀉之真水無所謂強也膀胱之邪氣旺則為水強瀉膀胱乃以瀉水也下分二法瀉子木為水之子水濕壅滯得風火以助之結為痰涎控去痰涎正所以疏肝而泄水也牽牛逐水消痰瀉氣分之濕熱大戟去臟腑水濕瀉肝經風火之毒瀉腑膀胱為腎之腑瀉腑則臟自不實澤瀉利濕行水豬苓利濕利水車前子滲膀胱濕熱利小便而不走氣防己瀉下焦血分濕熱為療風水之要藥茯苓除濕瀉熱下通膀胱水弱補之腎為水臟而真陽居於其中水虧則真陽失其窟宅無所依附故固陽必先補水補母肺為腎之母補肺金所以生腎水也人參大補肺中元氣山藥色白入肺益腎強陰氣火強則氣熱火弱則氣寒寒熱皆能傷氣補氣之法亦不外瀉火補火二端內經腎臟不分左右本草雖分究竟命門治法已該左腎中知母瀉火補水潤燥為腎經氣分藥元參色黑入腎能壯水以制火破故紙補相火以通君火暖丹田壯元陽砂仁辛溫益腎通行結滯苦參瀉火燥濕補陰益精血血屬陰陰與陽相配陽強則陰虧無陽亦無以生陰故滋陰溫腎皆所以益精而補血也亦兼命門治法在內黃柏瀉火補水腎經血分藥枸杞生精助陽清肝滋腎熟地黃滋腎水補真陰填骨髓生精血鎖陽益精興陽補陰潤燥肉蓯蓉入腎經血分補命門相火萸肉補腎溫肝強陰助陽阿膠養肝滋腎和血補陰五味子斂肺滋腎強陰澀精本熱攻之邪熱入里直攻腎臟非如前補氣條中用清熱之法可以緩圖者也惟有急攻一法下熱入腎臟真水已虧豈可攻下而傷寒少陰條中有用大承氣湯下之者以有口燥咽乾之證故屬之少陰其實乃少陰陽明也熱結於足陽明則土燥耗水熱結於手陽明則金燥不能生水攻陽明之熱正所以救腎水也況腎主二陰瀉腑所以通小便攻下所以通大便此亦瀉實之法補前條所未備本寒溫之北方水臟加以寒邪恐真陽易至消亡故有急溫一法溫里溫里亦不外下條益陽之法但本非真陽不足以寒邪犯本急用溫法故所用皆猛烈之藥與下補火法大同小異附子大熱純陽逐風寒濕乾薑生逐寒邪而發表炮除胃冷而守中官桂益陽補氣治沉寒痼冷之病白朮苦燥濕溫和中蜀椒發汗散寒入命門補火標寒解之寒邪直入陰分然尚在經絡未入臟腑故曰標寒解表寒邪入於少陰經絡雖在表未入於裡已與太陽之表不同第可引之從太陽而出不可過汗以泄腎經故不言發表而言解表也麻黃發表解肌去營中寒邪衛中風邪細辛辛溫散風邪乃足少陰本藥獨活搜風去濕入足少陰氣分桂枝發汗解肌溫經通脈標熱涼之寒邪入於骨髓久之變而為熱以邪猶在表故為標熱清熱熱自內出發熱而不惡寒不可發汗故用清熱之法元參入腎補水散無根浮游之火連翹入心瀉火除三焦濕熱甘草生用瀉火炙用補中入汗劑則解肌入涼劑則瀉邪火豬膚治少陰下利咽痛火強瀉之火強非火實也水弱故火強火強則水愈弱故瀉法仍是補法瀉相火腎火與水並處水不足火乃有餘滋陰即以瀉火所謂壯水之主以制陽光是也黃柏瀉相火補腎水不足知母潤腎燥而滋陰丹皮入足少陰瀉伏火涼血而生血地骨皮瀉肝腎虛熱涼血而補正氣生地黃滋陰退陽入足少陰茯苓行水瀉熱元參色黑入腎壯水以制火寒水石除三焦火熱火弱補之火居水內即坎中一畫之陽先天之本是也弱則腎虛而真陽衰敗故宜補益陽腎中元陽不足無以藏精而生血故補火而不失之燥則陽能配陰而火不耗水即用燥藥亦必以滋腎之藥佐之益陽與溫里所以不同所謂益火之原以消陰翳是也附子引補氣藥以復散失之元陽引補血藥以滋不足之真陽肉桂入肝腎血分補命門相火不足益智仁補命門之不足澀精固氣破故紙暖丹田壯元陽沉香入右腎命門能暖精壯陽川烏功同附子而稍暖寒宜附子風宜烏頭硫黃補命門真火不足性雖熱而能通天雄補下焦命門陽虛烏藥治厥逆之氣陽起石補右腎命門茴香暖丹田補命門不足胡桃屬水入腎佐破故紙大補下焦巴戟入腎經血分強陰益精丹砂同地黃枸杞之類養腎當歸和血養血治一切血證陰虛而陽無所附者蛤蜊補肺潤腎益精助陽覆盆益腎臟而固腎起陽痿縮小便精脫固之血生於陰而精化於陽陽不能固則精不能藏故固精屬之右腎澀滑澀以止脫澀之所以固之也牡蠣澀以收脫治遺精芡實固腎澀精金櫻子固精氣入腎經五味子收耗散之氣強陰澀精遠志能通腎氣上達於心治夢泄萸肉固精秘氣蛤蚧與牡蠣同功心包絡經第九是經起於天池穴終於中衝穴心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也經絡解小指次指即手小指之次指乃無名指也手厥陰心包絡經之脈受足少陰腎經之交起於胸中出屬心下之包絡由是下膈歷絡於三焦其支者自屬心包上循胸出脅下腋三寸天池穴上行抵腋下循臑內之天泉以界手太陰肺經手少陰心經兩經之中間入肘中之曲澤穴又由肘中下臂行臂兩筋之間循郄門間使內關大陵入掌中勞宮循中指出其端之中衝穴其支別者從掌中循無名指出其端而交於手少陽三焦經也心包絡經諸穴歌手厥陰心包之絡計有九穴而終自天池天泉為始逐曲澤郄門而通間使通乎內關大陵近於勞宮既由掌握抵於中衝分寸歌心包起自天池間乳後一寸腋下三天泉曲腋下二寸曲澤屈肘陷中央郄門去腕方五寸間使腕後三寸量內關去腕止二寸大陵掌後兩筋間勞宮屈中名指取中指之末中衝良病證解手心熱脈行於掌中也臂肘攣急腋腫胸脅支滿皆脈所過之地也憺憺大動心宜靜而反動本臟病也面赤目黃手少陰經病心包絡脈所通也喜笑不休心在聲為笑本臟病也脈所生病心主脈也煩心心痛本臟病也掌中熱即手心熱也以上經病多與心經相同以經脈相近也至於臟病心經則無而心包絡則有以心臟不可受邪凡病皆包絡相火受之也內經分心與心主為兩經本草言證治則合而為一今遵內經仍分為二至本草所載則附於心主條下以本病屬於心主標病兩經略同治法亦兩經無異也本草臟腑虛實標本用藥式心藏神為君火包絡為相火代君行令主血主言主汗主笑本病心包之病諸熱瞀瘈心主火火勝則目眩筋急驚惑譫妄煩亂心藏神心病則神亂啼笑罵詈與經言喜笑不休略同怔忡即心火病健忘心藏神自汗心主汗諸痛癢瘡瘍心主血熱傷血也標病經絡之病肌熱熱在血分畏寒戰慄熱極似寒舌不能言心主言面赤目黃心煩熱胸脅滿痛引腰背肩胛肘臂同經治法解火實瀉之心屬火邪氣有餘則為火實故用瀉下分四法瀉子土為火之子瀉脾胃之熱而心火自清黃連苦寒瀉心火王海藏曰瀉心實瀉脾也大黃大瀉血分實熱入足太陰足陽明氣火入上焦則肺氣受傷甘溫以益元氣而熱自退雖以補氣亦謂之瀉火火入下焦則小腸與膀胱氣化不行通水道瀉腎火正以導赤也甘草生用瀉火入涼劑則瀉邪熱人參大補元氣生亦瀉火赤茯苓瀉熱行水入小腸氣分木通通小腸膀胱導濕熱從小便出黃柏沉陰下降瀉膀胱相火血火入血分則血熱涼血所以瀉火丹參色赤入心破宿血生新血丹皮瀉血中伏火涼血而生血生地黃瀉心火涼血而生血元參壯水以制火鎮驚心藏神邪入心包則神不安化痰清熱兼以重墜亦鎮驚之義也硃砂瀉心經邪熱鎮心定驚牛黃清心解熱利痰涼驚紫石英重以去怯入心肝血分神虛補之心藏神正氣不足則為神虛故用補下分三法補母木為火之母肝虛則無以生火故補心必先補肝細辛辛溫肝膽烏梅味酸入肝棗仁甘酸而潤專補肝膽生薑肝欲散辛散所以補肝陳皮辛能散入厥陰行肝氣氣膻中為氣海膻中清陽之氣不足當溫以補之即降濁升清亦所以為補也桂心苦入心補陽活血澤瀉利濕熱濕熱既降則清氣上行白茯苓安心益氣定魄安魂茯神開心益智安魂養神遠志苦瀉熱溫壯氣能通腎氣上達於心石菖蒲辛苦而溫通竅補心血心主血補心必先補血生新去滯皆所以為補也當歸苦溫助心為血中氣藥熟地黃入手少陰厥陰生精血乳香香竄入心調氣和血沒藥通滯血補心虛本熱寒之不言本寒者心虛則寒上補虛條中已載省文也瀉火虛用甘寒實用苦寒瀉火之法不外二端黃芩苦入心寒勝熱瀉實火竹葉甘寒瀉上焦煩熱麥冬清心火潤肺燥芒硝苦寒除熱炒鹽瀉熱潤燥補心涼血涼血亦不外瀉火但瀉血中之火則為涼血生地黃入心瀉火平諸血逆梔子色赤入心瀉心經邪熱天竺黃入心經瀉熱豁痰標熱發之不言標寒者心經在上非寒邪所能幹且心主血脈邪入於脈已非在表有熱無寒可知散火火鬱則發之升散之藥所以順其性而發之與解表發表之義不同甘草入汗劑則解肌獨活搜風去濕麻黃發汗解肌兼走手少陰柴胡發表升陽平少陰厥陰邪熱龍腦辛溫散熱三焦經第十是經起於關衝穴終於耳門穴三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰腫耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也經絡解三焦手少陽之脈受手厥陰之交起於第四指之端關衝穴上出歷液門中渚循手表腕之陽池出臂外兩骨之間歷外關支溝會宗三陽絡四瀆至天井穴從天井上行循臂臑之外歷清冷淵消濼行手太陰之裡手陽明之外上肩循臂臑會肩髎天髎交出足少陽之後過秉風肩井下入缺盆復由足陽明之外而交會於膻中之上焦散布絡繞於心包絡乃下膈入絡膀胱以約下焦附右腎而止其支行者從膻中而上出缺盆之外上項過大椎循天牖上耳後經翳風瘈脈顱囟直上出耳上角至角孫過懸釐頷厭及過陽白睛明屈曲耳頰至䪼會顴髎之分其又支者從耳後翳風穴入耳中過聽宮歷耳門和髎卻出至目銳眥會瞳子髎循絲竹空而交於足少陽膽經也三焦經諸穴歌手少陽三焦之脈二十三穴之間關衝液門中渚陽池外關通連支溝會宗三陽絡四瀆天井清冷淵消濼臑會肩髎相聯天髎處天牖之下翳風讓瘈脈居先顱囟定而角孫近耳絲竹空而和髎接焉耳門既闢經穴已全分寸歌無名之外端關衝液門小次指陷中中渚液下去一寸陽池腕上之陷中外關腕後方二寸腕後三寸支溝容腕後三寸內會宗空中有穴用心攻腕後四寸三陽絡四瀆肘前五寸著天井肘外大骨後骨罅中間一寸摸肘後二寸清冷淵消濼對腋臂外落臑會肩前三寸量肩髎臑上陷中央天髎缺盆陷處上天牖天容之外旁翳風耳後尖角陷瘈脈耳後青脈現顱囟亦在青絡脈角孫耳廓中間上耳門耳前起肉中禾髎耳前動脈張欲知絲竹空何在眉後陷中仔細量病證解耳聾渾焞脈入耳中也嗌腫喉痹脈上項也汗出汗為心液三焦為心包之表也目銳眥痛脈至銳眥也耳後肩臑肘臂外痛小指次指不用脈所經之地也以上皆經病未及腑病也本草臟腑虛實標本用藥式三焦為相火之用分布命門元氣主升降出入遊行天地之間總領五臟六腑營衛經絡內外上下左右之氣號中清之府上主納中主化下主出本病臟腑之病諸熱瞀瘈腑臟同病暴病暴卒暴喑火性急烈也躁擾狂越譫妄驚駭腑臟同病諸血溢血泄火盛則血熱妄行諸氣逆衝上火性炎上諸瘡瘍同臟病痘疹瘤核亦瘡瘍之類三焦本病上已詳敘以下六條皆他臟他腑之病諸經已載此復詳敘三焦條下者以三焦總領五臟六腑營衛經絡無所不貫故也上上謂心肺胸膈上脘諸經熱則喘滿諸嘔吐酸胸痞脅痛食飲不消頭上汗出中中謂脾胃兩經熱則善飢而瘦解㑊尺脈緩澀謂之解㑊中滿諸脹腹大諸病有聲鼓之如鼓上下關格不通霍亂吐利下下謂肝腎大小腸膀胱諸經熱則暴注下迫水液渾濁下部腫滿小便淋瀝或不通大便閉結下痢上寒三焦屬火火實則熱火虛則寒則吐飲食痰水胸痹前後引前食已還出中寒則飲食不化寒脹僅胃吐水濕瀉不渴下寒則二便不禁臍腹冷疝痛標病經絡之病惡寒戰慄如喪神守同本臟病耳鳴耳聾嗌乾喉痹同經諸病胕腫疼酸本經在手但三焦為決瀆之官水道不行下注而為胕腫驚駭驚必兼搐證見手足故屬標病手小指次指不用同經治法解實火瀉之三焦屬火邪氣有餘則實故用瀉下分三法汗實在表則發汗亦兼諸經解表之法麻黃足太陽手少陰陽明汗藥柴胡少陽汗藥葛根手足陽明汗藥荊芥足厥陰經汗藥升麻陽明太陰汗藥薄荷足厥陰經汗藥羌活足太陽足少陰厥陰汗藥石膏足陽明手太陰三焦汗藥吐實在上焦則用吐法瓜蒂吐風熱痰涎上膈宿食食鹽辛溫能湧吐齏汁酸鹹吐痰飲宿食下實在中焦下焦則用下法大黃大瀉血分實熱下有形積滯芒硝盪滌三焦腸胃實熱虛火補之虛火謂火不足之證即寒也故溫之所以為補上焦人參甘溫補肺天雄補下焦以益上焦桂心苦入心中焦人參益土生金黃耆補中益氣丁香溫胃木香和脾氣草果健脾暖胃下焦附子補命門相火肉桂入肝腎血分補命門相火硫黃補命門真火不足人參得下焦引藥補三焦沉香入命門暖精壯陽烏藥治膀胱冷氣破故紙入命門補相火本熱寒之不言本寒者虛火即寒省文也實火亦熱但前言瀉法此不用瀉而用寒則本熱不必皆實火瀉熱亦不止汗吐下三法也參看具有精義上焦黃芩酒炒上行瀉肺火連翹瀉心火與心包火梔子瀉心肺熱知母上清肺金而瀉火元參散浮游之火石膏色白入肺生地黃瀉心火中焦黃連為中部之使連翹兼除手足少陽手陽明濕熱生芐隨他藥能治諸經血熱石膏足陽明大寒之藥下焦黃柏瀉膀胱相火知母瀉腎火生芐入手太陽陽明治溺血便血石膏兼入三焦丹皮瀉肝腎火骨皮瀉肝腎虛熱標熱散之三焦經脈在上且少陽居表裡之間無所謂寒也故不言標寒解表解表亦是汗法但前通言諸經汗法此則專指本經言故前條首言麻黃而此條首言柴胡不用麻黃也柴胡少陽表藥細辛少陰本藥辛益肝膽可通少陽荊芥肝經表藥可通少陽羌活肝經表藥可通少陽葛根陽明表藥能升陽散火石膏三焦表藥膽經第十一是經起於瞳子髎穴終於竅陰穴膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小趾次趾之間其支者別跗上入大趾之間循大趾歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外髁前及諸節皆痛小趾次趾不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也經絡解脅又名胠曲骨之外為毛際毛際兩旁動脈為氣衝髀厭髀樞也脅骨之下為季脅䯒骨為輔骨外踝以上為絕骨足面為跗足大趾本節後為歧骨大趾爪甲後為三毛足少陽膽經之脈受手少陽三焦之交起於目銳眥之瞳子髎由聽會客主人上行頭角循頷厭下懸顱懸釐循耳上髮際至曲鬢率谷由率谷外折下耳後循天衝浮白竅陰完骨又自完骨外折循本神下至陽白會睛明復從睛明上行循臨泣目窗正營承靈腦空風池至頸行手少陽之脈前下至肩上循肩井卻左右交出手少陽之後入缺盆外其支者自耳後入耳中過聽宮至目銳眥瞳子髎之分其支者別自瞳子髎下大迎合手少陽於䪼下臨頰車下頸循本經之前與前之入缺盆者相合下胸中天池之外貫膈即期門之所絡肝下屬於膽自屬膽處循脅裡至氣衝繞毛際遂橫入髀厭之環跳穴其直行者從缺盆下腋循胸歷淵液輒筋日月過季脅循京門帶脈五樞維道居髎與前之入髀厭者相合乃下循髀外循太陽陽明之間歷中瀆陽關出膝外廉抵陽陵泉下輔骨前歷陽交外丘光明直下抵絕骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨泣五會俠谿乃上入小趾次趾之間至竅陰而終其支別者自足面臨泣別行入大趾循歧骨內出大趾端還貫入爪甲出三毛以交於足厥陰肝經也膽經諸穴歌足少陽兮四十三瞳子髎近聽會間客主人在頷厭集懸顱懸釐曲鬢前由率谷天衝而下見浮白竅陰之妍完骨露兮本神陽白臨泣見兮目窗與連正營承靈居其後腦空穴繼靈而安風池肩井兮淵液輒筋日月兮京門闢帶脈五樞由維道居髎而續環跳風市抵中瀆飲陽關之陽陵泉至陽交之外丘間光明陽輔懸鐘可瞻丘墟臨泣地五會俠谿竅陰而膽經全分寸歌足少陽兮四十三頭上廿穴分三折起自瞳子至風池積數陳之次序說瞳子髎近眥五分耳前陷中聽會穴客主人名上關同耳前起骨開口空頷厭懸顱之二穴腦空下廉曲角中懸釐之穴異於茲腦空下廉曲角上曲鬢耳上髮際隅率谷耳上寸半安天衝耳後入發二浮白入發一寸間竅陰即是枕骨穴完骨之上有空連完骨耳後入髮際量得四分須用記本神神庭旁二寸入發一寸耳上系陽白眉上方一寸發上五分臨泣是發上一寸當陽穴發上寸半目窗至正營發上二寸半承靈發上四寸諦腦空發上五寸半風池耳後發陷寄肩井肩上陷中求大骨之前一寸半淵液腋下方三寸輒筋期下五分判期門卻是肝經穴相去巨闕四寸半日月期門下五分京骨監骨下腰絆帶脈章門下寸八五樞章下寸八貫維道章下五寸三居髎章下八寸三章門緣是肝經穴下脘之旁九寸含環跳髀樞宛宛中屈上伸下取穴同風市垂手中指盡膝上五寸中瀆逢陽關陽陵上三寸陽陵膝下一寸從陽交外踝上七寸外丘踝上六寸容踝上五寸光明穴踝上四寸陽輔通踝上三寸懸鐘在丘墟踝前之陷中此去俠谿四寸五卻是膽經原穴功臨泣俠谿後寸半五會去溪一寸窮俠谿在趾歧骨內竅陰四五二趾中病證解口苦膽汁味苦也善太息膽氣不舒也腑病也心脅痛不能轉側脈循脅裡也面塵體無膏澤脈所過處氣鬱為病也足外反熱脈循外踝也頭痛脈行於頭也頷痛脈加頰車也銳眥痛脈起於目也缺盆腫痛脈入缺盆也腋腫脈下腋也馬刀俠癭脈循頸項腋脅也汗出振寒瘧少陽居半表半裡也胸脅以下諸節痛皆脈所經也小趾次趾不用脈所絡也本草臟腑虛實標本用藥式膽屬木為少陽相火發生萬物為決斷之官十一臟之主主同肝本病臟腑之病口苦嘔苦汁善太息同經憺憺如人將捕狀膽氣虛目昏肝主目不眠魂藏於肝少陽與肝為表裡標病經絡之病寒熱往來痁瘧胸脅痛頭額痛耳痛鳴聾瘰癧結核馬刀足小趾次趾不用俱同經治法解實火瀉之木旺生火火有餘則為實故用瀉瀉膽相火有餘則膽實瀉火所以瀉膽也龍膽草益肝膽而瀉火牛膝瀉膽除腦中熱豬膽瀉肝膽之火生蕤仁消火散熱治目赤腫痛生酸棗仁生用酸平療膽熱黃連瀉火益肝膽豬膽汁炒苦茶瀉熱消痰虛火補之肝腎虧弱相火易虛故用補溫膽膽虛則寒故宜溫補補氣補血所以溫之也人參甘溫補氣正氣旺則心肝靜細辛辛益肝膽半夏補肝潤腎除濕化痰當歸和血養血炒蕤仁補肝明目炒棗仁專補肝膽炒熟療膽虛不眠地黃補陰生血本熱平之不言本寒者已具溫膽條中省文也除火瀉膽條中亦多降火之藥但火兼虛實前言其實此兼言其虛黃芩瀉實火仲景柴胡湯用為少陽里藥黃連解見前條芍藥瀉肝火能於土中瀉木連翹除少陽氣分實熱甘草入涼劑則瀉邪火鎮驚肝藏魂有熱則魂不安而膽怯重以止怯所以鎮之也黑鉛鎮心安神水銀主天行熱疾安神鎮心標熱和之不言標寒者少陽半表所主在筋邪入於筋較肌肉更深則寒變為熱和解和法較解肌更輕柴胡足少陽表藥芍藥瀉肝火入肝經血分黃芩足少陽里藥半夏發表開鬱甘草入汗劑則解肌肝經第十二是經起於大敦穴終於期門穴肝足厥陰之脈起於大趾叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口僅小於人迎也經絡解三毛後橫紋為叢毛目內深處為系頏顙咽顙也足厥陰脈受足少陽膽之交起於大趾叢毛之大敦循足跗上廉歷行間太衝抵內踝前一寸之中封上踝過三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉循股內之陰包五里陰廉入陰毛中左右相交環繞陰器抵小腹上循章門至期門之所挾胃屬肝下絡於膽又自期門上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下行頰裡交環於唇口之內其又支者從期門屬肝處別貫膈上注肺下行至中脘之分以交於手太陰肺經也肝經諸穴歌足厥陰一十三穴終起大敦於行間循太衝於中封蠡溝中都之會膝陽曲泉之宮襲陰包於五里陰廉乃發尋羊矢於章門期門可攻分寸歌足大趾端名大敦行間大趾縫中存太衝本節後二寸跟前一寸號中封蠡溝踝上五寸是中都踝後七寸中膝關犢鼻下二寸曲泉曲膝盡橫紋陰包膝上方四寸氣衝三寸下五里陰廉衝下有二寸羊矢衝下一寸許氣衝卻是胃經穴鼠鼷之上一寸主鼠鼷橫骨端盡處相去中行四寸止章門下脘旁九寸肘尖盡處側臥取期門又在巨闕旁四寸五分無差矣病證解腰痛肝與腎通乙癸同源也㿉疝脈繞陰器也小腹腫脈抵小腹也嗌乾脈循喉嚨也面塵脫色肝膽同病也胸滿脈貫膈也嘔逆脈挾胃也飧泄風火性急不及消化也狐疝脈過陰器也本草臟腑虛實標本用藥式肝藏血屬木膽火寄於中主血主目主筋主呼主怒本病臟腑之病諸風肝主風木眩運風火之象僵臥強直驚癇諸風火上炎筋脈受傷之證兩脅腫痛胸肋滿痛肝脈貫膈布脅肋腫痛滿痛似屬標病但肝為雷火諸逆衝上皆屬於火則胸脅作痛皆火逆為之也況經脈伏行之地在內不在外故屬之本病之類疝痛標病中有㿗疝小腹腫痛而此列之本病以腹中作痛皆得名之為疝非必下連睪丸也癥瘕血積為癥氣聚為瘕女人經病血室屬於肝經標病經絡之病寒熱瘧同經頭痛吐涎脈上額會於巔目赤脈上連目系面青脈行頰裡多怒怒必外見辭色故為標病耳閉少陽脈入耳中肝之表也頰腫脈行頰裡筋攣肝主筋卵縮丈夫㿗疝脈繞陰器女人少腹腫痛陰病脈抵小腹治法解有餘瀉之肝實則為有餘故用瀉下分五法瀉子心為肝之子瀉心火所以瀉子也甘草瀉丙火行氣肝主血而氣者所以行乎血氣滯則血凝行血中之氣正以行血也香附血中氣藥調氣開鬱川芎行氣散瘀血中氣藥瞿麥破血利竅牽牛瀉氣分濕熱通下焦郁遏青皮入肝膽氣分破氣散血行血血凝滯不行則為實舊血不去則新血不流破血乃所以行血也紅花入肝經破瘀活血鱉甲色青入肝治血瘕經阻桃仁厥陰血分藥泄血滯生新血莪朮入肝經血分破血消積三稜入肝經血分破血消積穿山甲專能行散入厥陰通經大黃大瀉血分實熱下積通經水蛭逐惡血瘀血破血癥積聚虻蟲破血積堅痞癥瘕蘇木入三陰血分破瘀血丹皮破積血通經脈鎮驚邪入肝經則魂不安而善驚逐風熱墜痰涎皆所以鎮之也雄黃得正陽之氣入肝經氣分瀉肝風金箔金制木重鎮怯治肝膽風熱之病鐵落平肝去怯治善怒發狂珍珠瀉熱定驚鎮心安神代赭石鎮虛逆治血熱夜明砂瀉熱散結胡粉墜痰消脹銀箔鎮心明目主風熱癲癇鉛丹墜痰去怯龍骨收斂浮越之正氣安神鎮驚石決明除肝經風熱搜風肝主風木故諸風屬肝搜風之法於肝經獨詳羌活搜肝風荊芥入肝經散風熱薄荷搜肝風散風熱槐子入肝經氣分疏導風熱蔓荊子散上部風邪白花蛇透骨搜風獨活搜肝去風皂莢搜風泄熱烏頭大燥去風防風搜肝去風白附子去頭面遊風殭蠶治風化痰蟬蛻除風熱治皮膚不足補之肝虛則為不足故用補下分三法補母腎為肝之母故云肝無補法補腎即所以補肝也枸杞清肝滋腎益氣生精杜仲甘溫補腎狗脊平補肝腎熟地黃滋腎水補真陰苦參燥濕勝熱補陰益精萆薢固下焦補肝虛阿膠養肝滋腎和血補陰菟絲子強陰益精平補三陰補血血宜流通而惡壅滯補血之中兼以活血乃善用補者也當歸和血補血為血中氣藥牛膝益肝腎生用破惡氣續斷補肝腎宣通血脈白芍藥補血瀉肝血竭散瘀生新和血聖藥沒藥通滯血補肝膽川芎補血潤燥散瘀通經補氣木性條達郁遏之則其氣不揚辛以補之所以達其氣天麻辛溫入肝經氣分益氣強陰柏子仁滋肝明目肝經氣分藥蒼朮升氣散瘀菊花去風熱明目細辛辛散風熱補益肝膽密蒙花潤肝明目決明入肝經除風熱穀精草辛溫去風熱入厥陰肝經生薑辛溫散寒宣氣解鬱本熱寒之不言本寒者不足即為虛寒溫補之法已見上條省文也瀉木木中有火瀉木亦不外瀉火但酸以瀉木咸以瀉火瀉中有補與下瀉火攻裡有虛實之分與上補母補氣血又有寒溫之辨芍藥酸瀉肝大補肝血烏梅酸斂肺補金以制木澤瀉咸瀉腎火起陰氣瀉火苦寒瀉火亦是瀉其有餘但不用攻伐止用寒涼亦是和解之法黃連瀉肝膽火豬膽汁炒龍膽草益肝膽而瀉火除下焦濕熱黃芩瀉少陽相火苦茶瀉熱下氣豬膽瀉肝膽火攻裡行血亦用大黃是行血亦攻裡但攻裡不必行血故另立攻裡一條皆所以瀉實火也大黃入肝經血分下燥結而去瘀熱標熱發之肝主筋在肌肉之內邪入肝經寒變為熱故不言標病和解肝之表少陽也故用少陽和解之法柴胡少陽表藥半夏辛散發表開鬱解肌邪入筋而用解肌法解肌而用太陽發表藥蓋邪已深入引之從肌肉而達皮毛也桂枝發汗解肌麻黃發汗解肌
