body:
  text: 附奇經八脈歌督脈起自下極腧並於脊裡上風府過腦額鼻入齦交為陽脈海都綱要任脈起於中極底上腹循喉承漿里陰脈之海妊所謂衝脈出胞循脊中從腹會咽絡口唇女人成經為血室脈並少陰之腎經與任督本於陰會三脈並起而異行陽蹺起自足跟里循外踝上入風池陰蹺內踝循喉嗌本足陰陽脈別支諸陰交起陰維脈發足少陰築賓郤諸陽會起陽維脈太陽之郤金門穴帶脈周回季脅間會於維道足少陽所謂奇經之八脈維繫諸經乃順常穴同名異類一穴二名後頂一名交沖強間一名大羽竅陰一名枕骨腦戶一名合顱曲鬢一名曲發腦空一名顳顬顱囟一名顱息聽宮一名多所聞瘈脈一名資脈素髎一名面正水溝一名人中承漿一名懸漿廉泉一名舌本風府一名舌本上星一名神堂絲竹空一名目髎睛明一名淚孔巨髎一名巨窖肩井一名膊井淵液一名泉液臑會一名臑髎大椎一名百勞命門一名屬纍風門一名熱府巨闕一名心募期門一名肝募腎俞一名高蓋中膂內俞一名脊內俞天窗一名窗籠天鼎一名天頂天突一名天瞿扶突一名水穴天池一名天會人迎一名五會缺盆一名天蓋俞府一名輸府玉堂一名玉英神關一名氣舍四滿一名髓府腹結一名腸窟衝門一名上慈宮氣衝一名氣街橫骨一名曲骨端輒筋一名曲骨端陰都一名食宮陽輔一名分肉水分一名分水水突一名水門會陽一名利機會陰一名屏翳商陽一名純陽太淵一名太泉三間一名少谷二間一名間谷陽溪一名中魁合谷一名虎口少衝一名經始三里一名手三里少澤一名小吉少海一名曲節陽池一名別陽天泉一名天濕蠡溝一名交儀支溝一名飛虎中都一名中郤中封一名懸泉陰包一名陰胞三陽絡一名通門委中一名血郤陰交一名橫戶漏谷一名太陰絡懸鐘一名絶骨血海一名百蟲窠地機一名脾舍下廉一名下巨虛上廉一名上巨虛伏兔一名外句陰市一名陰鼎照海一名陰蹺太溪一名呂細崑崙一名下崑崙金門一名梁關附陽一名付陽飛揚一名厥陽環跳一名臏骨僕參一名安邪湧泉一名地衝申脈一名陽蹺一穴三名絡卻一名強陽一名腦蓋禾髎一名長顪一名禾窖客主人一名上關一名客主瞳子髎一名前關一名太陽頰車一名機關一名曲牙聽會一名聽河一名後關肩髃一名中肩井一名遍肩脊中一名神宗一名脊俞膻中一名亶中一名元見鳩尾一名尾翳一名𩩲骬上脘一名上管一名胃脘中脘一名太倉一名胃募氣海一名脖胦一名下肓氣穴一名胞門一名子戶中府一名府中俞一名肺募勞宮一名五里一名掌中大赫一名陰維一名陰關長強一名氣郤一名橛骨日月一名神光一名膽募承筋一名腨腸一名直腸溫溜一名池頭一名逆注復溜一名昌腸一名伏白陽關一名陽陵一名關陵陽交一名別陽一名足窖神門一名鋭中一名中都然谷一名然骨一名龍淵一穴四名啞門一名喑門一名舌橫一名舌厭攢竹一名始光一名光明一名員柱關元一名丹田一名大中極一名小腸募中極一名玉泉一名氣原一名膀胱募天樞一名長溪一名谷門一名大腸募京門一名氣俞一名氣府一名腎募承山一名魚腹一名肉柱一名腸山承扶一名肉郤一名陰關一名皮部一穴五名百會一名三陽一名五會一名巔上一名天滿章門一名長平一名季脅一名脅髎一名脾募一穴六名腰俞一名背解一名腰戶一名髓孔一名腰柱一名髓府石門一名利機一名丹田一名精露一名命門一名三焦募名同穴異類頭臨泣足臨泣頭竅陰足竅陰腹通谷足通谷背陽關足陽關手三里足三里手五里足五里跋爰夫醫書肇自軒歧方藥傳於盧扁漢唐以來禁方多不傳之祕宋元而後著書皆補救之文非精心以燭其源流則治疾而疾且益甚得博學以深為考究斯解經而經乃不亡如我雙湖世伯大人以孝旌於朝事實中載庸行數條以及樂善好施諸大端類皆嘖嘖人口惟醫學指歸二卷尚未梓行寬乞而抄讀之恍然知藥按君臣佐使證詳表裡陰陽酌古準今法良意美洵靈樞之功臣也寬先世亦以太醫院顯名於世悔無傳人及世伯自郵遷興與寬祖宅比鄰交深三世因得薰陶其學問熟悉其生平焉每憶世伯造詣深邃稟資靈明醫由孝生養老之新書可補道從心悟課功之伏案何勤遇窶人則極力扶持幾忘囊盡臨疑證則一經調攝輒見春回詎意庚戌年天災流行因救病而不計安居遂勞神而致成重疫葛仙即病臥不起猶憫貧民公臥病所言皆臨證及素行善事文翁雖宴飲如常早知亡日公易簀前三旬自知不壽方書一卷僅稱身後之遺探索終身始著不刊之作嗚呼趙孟往而無與為善倉公歿而誰為生人手澤猶存心源可接所欣克家著望醫緩永稱繼起之良益信教孝有書儒門別無事親之録咸豐元年八月下旬世愚侄姚武寬頓首謹識
