front:
  text: 序余自服官以來三令興化每接士大夫必詢其人之孝友者及仁厚端謹者期以為風俗倡又以其地數有水患人多病濕思得良醫起其病衆咸以雙湖趙君對已而因微疾見其人恂恂然恭且謹及其論脈絡分寸如洞見五臟癥結冠一時歧黃家乃知君故高郵人家於興為醫以活人為志江淮間足迹殆遍性謙慎好施豫樂於為善內行尤淳篤事二親克孝遇病且貧者就醫必贈以藥雖大寒暑治病弗輟兼以其暇成醫學指歸一書俾後之學醫者識經絡原委焉夫以所見於君者如彼所聞於人者如此其孝而好善也信矣其仁厚端謹而工醫也信矣余因望興人而並及於僑興之人君乃其尤粹者故於君歸道山時余有實心為善之額貺之近聞令子以君行實請旌於朝余亦以令興久編輯興志將成書載君於流寓傳然則君志在活人君之書又志在貽後學以活人讀其書者亦可悟折肱之微意也夫因是書就刊悉君之生平而樂為之序欽加知州銜知興化縣事靈石梁園棣拜撰昔范文正公文章德業為有宋一代完人少時嘗曰吾不能為良相必為良醫蓋良相治國良醫治病事異而心與理則同也顧不察夫經絡脈息不足以言醫即察夫經絡脈息而不審證之寒熱虛實辨藥之君臣佐使亦斷不能醫醫豈易言哉雙湖先生隸高郵居興化篤行君子也少攻舉業誦輒不忘事親孝逮養大母大母病隨侍湯藥苦無善治者遂專心習醫精研脈理自靈樞素問以及景嶽諸家審證立方製藥之法確有心得吾鄉龔意舲太守向宰興化曾為余言先生品粹醫精竊心慕之而未一面也己亥館泰署始識荊越辛丑余來承乏興邑文正書院交益密每病治無不愈甲辰返里病篤諸醫斂手偶檢先生舊方一服即痊後詢其故先生謂病有本有標此適合隔一隔二治法也其精審詳密類如此先生天性肫摯善承先志拯困恤嫠樂善不倦歿後郵興兩邑纂列乘志籲大吏請旌孝行而諸哲嗣能讀遺書蜚聲藝苑長君小湖前徽克紹四方就診無異昔時今春余病纍旬屢醫弗效長君適自外歸數帖霍然淵源洵有自也頃以先生手輯醫學指歸屬序讀之鉤元提要縷析條分益信品粹醫精龔公諒非虛語嘗至盂城泛珠湖登文遊臺穆然想見前哲之流風而興邑有得勝湖又昔賢文正公蒞治之邦也先生自號雙湖其有慕文正公良相良醫之説擇其一以濟人乎東坡先生謂范公仁義禮樂孝弟忠信為有德者必有言先生出是編以證世墨沈沾溉臻斯民於仁壽則良醫直與良相同功矣是為序時咸豐元年辛亥閏八月下浣韻溪愚弟蔡春泉頓首拜序語云為人子者不可不知醫吾友趙君雙湖純乎孝者也幼因侍祖母疾棄舉業習醫盡通其術著手則效活人無算聲名藉藉江淮間生平好陰行善多仁人長者之行鰥寡孤獨之賴以舉火者日數十家寓乎醫以施濟焉孰非孝行所推哉今以孝旌於朝令嗣小湖復梓是書問世君之醫與孝傳小湖之醫之孝亦俱傳吾欽其人樂為敘梗概云咸豐元年九月上浣世愚弟鄭鑾拜敘生人者天也然寒暑不正雨暘不時則病人者亦天天病人而不能治人病惟醫體天好生之心以補其缺憾人之一身殆初生於天後生於醫乎醫代天工天報醫必厚乃扁鵲以伎見殃倉公坐法當刑其故何也竊謂醫必伎與心兼良乃可稱良醫而受福報伎劣人憎心慝天譴醫之心非必好利而草菅人命始為不良也驕吝未除則濟人弗廣而已足自殺其軀越人誚中庶子以管窺天淳于不為人治病病家多怨察其心似未免驕吝宜乎伎高賈禍太史公引老子慨美好者不祥之器豈其然哉雙湖趙先生蓋伎與心兼良者籍高郵僑寓吾興深於素問靈樞諸書以醫鳴三十年名動江淮間懼世醫之不辨虛實表裡寒熱溫涼也著醫學指歸二卷先生卒後令子小湖將授梓乞祚撰敘祚自慚譾陋未讀內經何敢敘先生之書惟觀今之名醫趾高氣盛不耐煩勞又或祕惜禁方弗肯示人而先生謙退不伐視疾兢兢然恐有錯誤日治百餘人自朝至夜分始罷寢食或廢未嘗憚煩且天性篤孝當事請旌於朝貧而好施邑中窮嫠恃以衣食者甚衆窶人就療輒贈藥物茲復述其所得輯為一書欲登斯人仁壽之域不驕不吝非良於伎而尤良於心者耶藝精而人不忌身歿而子克家天之所以報先生者顯其名昌其後視扁鵲輩奚啻過之昔樂天謂夢得詩在在處處有靈物陰護祚謂是編亦然必傳於世無疑也故樂為之序咸豐元年歲在辛亥閏八月上浣學山李福祚頓首撰吾友雙湖先生所遺醫學指歸一書其子小湖暨諸昆季付之梓而公諸世囑宜敘宜不知醫何敘為然先生所以業醫之故惟宜知之且悉初至興也年十有七即與交見所閲醫書通目即稔宜嘗勸讀儒書先生曰儒書明理儘性以盡人之性醫書亦然曩者先祖妣及先妣病延醫診治久藥不瘳竊嘆己不知醫致使大人彌留床蓐又嘗見有父母者往往因小疾而誤於方劑卒至殞身失養恨不知酌良劑以活之俾其親得終餘年醫之習也緣是故耳宜因知先生之醫為事親計也且為凡事親者計也古云孝弟為仁之本先生一生盡孝而外行仁之事不能枚舉宜乎大江南北聲名藉甚至易簀後上至官長縉紳下及鄉愚婦孺無不望棺拜奠涕泗交頤者迹其致病之原春夏交會大疫流行先生迫於救人至數十晝夜而未安寢食由是精神耗竭自知不治詔諸子曰吾勤勞數十年一無所遺惟遺此書耳此書乃爾先祖命吾敬慎輯成留為爾曹之志於醫者酌用閲書所載悉本神農本草黃帝內經以為言禮曰醫不三世不服其藥此書一出將神明於三世者多矣噫先生遵父命而遺書於子其子又能推父意而公書於人是亦以孝繼孝之意歟或謂子與先生交既久盍以其孝行詳敘於此宜曰指日天恩表孝綸綍煌煌永垂不朽亦奚事宜臚陳其事而後傳咸豐元年歲次辛亥仲秋上浣世愚弟劉春宜頓首敘
