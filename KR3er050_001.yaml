body:
  text: 自敘余少時立志於儒因祖母病篤延醫罔效深以不知醫理即不能事親為憾遂肄醫讀內經諸書乃知天人合一之道本與儒通其理微其法妙愈加考核愈覺艱深初尚半明半昧繼則將信將疑幾有望洋之嘆竊以醫之為道外感內傷為證治兩大關鍵去其所本無復其所固有儒如是醫亦如是可兩言而盡之蓋六淫外襲身中氣血日失和平有汗吐下和之治是去其所本無也若七情暗傷身中氣血日就虧耗有滋填培補之治是復其所固有也然不知十二經絡不辨虛實表裡寒熱溫涼差之毫釐謬以千里舉手便錯三十餘年來恆潛心於此辨究如履虎尾如涉春冰不敢以人命為嘗試惟謹守規矩之中不矜奇亦不炫異謂我拙者聽之笑我迂者亦聽之終其身日以寡過自期平居用藥悉遵本草用藥式熟讀黃帝靈樞經脈篇及諸穴分寸歌日加探索爰集成經絡解病證解治法解各十二篇並繪成十二經圖十二腑臟圖作者謂聖述者謂明即僅云述余亦何敢不過編釋一册願後之子孫能儒則儒否則欲學為醫亦當如余之由儒習醫兢兢惕惕先討論乎是書奉為指歸然後參讀古聖賢各家注集庶幾脈證相參經絡既明用藥自有把握行見危者安困者亨登斯人於仁壽之域是則豫之所厚望也子孫其守藏之勿替道光二十八年歲在戊申仲冬日高郵趙術堂觀瀾氏自敘
