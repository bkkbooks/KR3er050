body:
  text: 卷上肺經第一是經起於中府穴終於少商穴肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也經絡解中焦者中脘也胃口胃之上脘也絡猶兜也循巡也膈心下膈膜也肺系喉嚨也肩下脅上曰腋膊下對腋處為臑臑盡處為肘肘以下為臂廉隅也關前動脈為寸口大指本節之後其肉隆起處統謂之魚魚際則其間之穴名也端杪也支者如木之有枝以其自直行之脈而旁行之也脈之直行者為經旁行者為絡臂骨盡處為腕手太陰肺經之脈起於中焦者以穀氣入胃其精微之氣上注於肺脈也下絡大腸以肺與大腸相表裡也轉巡胃之上口屬之於肺即從肺系橫出腋下蓋由胸中之中府雲門以出腋下下循臑內歷天府俠白行於手少陰心經手厥陰心主包絡兩經之前下入肘中抵尺澤穴既下肘中乃循臂內上骨之下廉歷孔最列缺入寸口之經渠太淵以上魚又循魚際出大指之端至少商穴而止其支者從腕後之列缺穴交於手之陽明經以至於商陽穴又隨商陽而上行也肺經諸穴歌手太陰十一穴中府雲門天府列俠白下尺澤孔最見列缺經渠太淵下魚際抵指少商如韭葉分寸歌太陰肺兮出中府雲門之下一寸許雲門璇璣旁六寸巨骨之下二寸數天府腋下三寸求俠白肘上五寸主尺澤肘中約橫文孔最腕上七寸取列缺腕側一寸半經渠寸口陷中主太淵掌後橫紋頭魚際節後散脈舉少商大指端內側相去爪甲韭葉許病證解動者動穴也以各經之穴動則知其病也所生病本經自病也諸病他經合病也或由本經而累及他經或由他經而干犯本經皆是也氣盛邪氣之盛也氣虛正氣之虛也統自病合病氣盛氣虛四項而病情約略殆盡其間每項各舉數證以見意他經亦有止言自病合病二項不復詳言盛虛諸病者蓋即此可以類推也如肺脹滿致膨膨而喘急咳嗽此臟病也缺盆中痛甚則交兩手而瞀此經絡病也缺盆雖大腸所經之地而絡脈交於大腸仍肺之經絡也故皆為肺生之病以下為咳為喘病與上同而與上氣渴煩心等病並舉則他經所累也胸滿亦與脹滿相同脹滿專以肺言此則兼諸氣之膹郁也臑臂內痛亦本經之病與上兩手掣痛無異而與厥掌中熱並言則心與心主之所累及也肩背疼痛氣盛氣虛皆同而所因異也汗出中風肺主皮毛故也小便數而欠與溺色變皆腎與膀胱之病母病累及子也少氣不足以息本臟病也以上所敘諸證甚詳其有未備者更以本草標本諸病參看本草臟腑虛實標本用藥式肺藏魄屬金總攝一身元氣主聞主哭主皮毛本病臟腑之病諸氣膹郁肺主氣諸痿肺為五臟華蓋故五臟之痿皆屬於肺氣短咳嗽上逆同經咳唾膿血肺癰也不得臥肺藏魄也小便數而欠遺失不禁同經標病經絡之病灑淅寒熱肺主皮毛傷風自汗肩背痛冷臑臂前廉痛同經治法解本經所言補瀉寒熱治病之法已該但經以針言後世針法失傳以用藥代之本草所論補瀉寒熱用藥之式正與經意相合詳註於後以代治法解氣實瀉之肺主氣實者邪氣之實也故用瀉下分四法瀉子水為金之子瀉膀胱之水則水氣下降肺氣乃得通調澤瀉入膀胱利小便葶藶大能下氣行膀胱水桑皮下氣行水地骨皮降肺中伏火從小便出除濕肺氣起於中焦胃中濕痰凝聚其氣上注於肺去胃中濕痰正以清肺半夏除濕化痰和胃健脾白礬爆濕追涎化痰墜濁白茯苓利竅除濕瀉熱行水薏苡仁甘益胃土勝水淡滲濕木瓜斂肺和胃去濕熱橘皮理氣燥濕導滯消痰瀉火肺屬金畏火火有君相之別君火宜清相火有從逆兩治氣實只宜逆治粳米色白入肺除煩清熱石膏色白入肺清熱降火寒水石瀉肺火胃火治痰熱喘嗽知母清肺瀉火潤腎滋陰訶子斂肺降火泄氣消痰通滯邪氣有餘壅滯不通去其滯氣則正氣自行枳殼破氣行痰薄荷辛能散冷能清搜肝氣抑肺盛生薑辛溫發表宣通肺氣木香升降諸氣泄肺疏肝厚朴辛溫苦降下氣消痰杏仁瀉肺解肌降氣行痰皂莢通竅吐痰入肺大腸桔梗入肺瀉熱開提氣血表散寒邪蘇梗下氣消痰祛風定喘氣虛補之正氣虛故用補下分三法補母土為金母補脾胃正以益肺氣甘草補脾胃不足人參益土生金大補元氣升麻參耆上行須此引之黃耆壯脾胃補肺氣山藥入肺歸脾補其不足潤燥補母是益肺中之氣潤燥是補肺中之陰金為火刑則燥潤燥不外瀉火瀉實火則用苦寒瀉虛火則用甘寒蛤蚧補肺益精定喘止嗽阿膠清肺滋腎補陰潤燥麥冬清心潤肺強陰益精貝母瀉火散結潤肺清痰百合潤肺安心清熱止嗽天花粉降火潤燥生精滑痰天冬清金降火滋腎潤燥斂肺久嗽傷肺其氣散漫或收而補之或斂而降之宜於內傷外感禁用烏梅斂肺澀腸清熱止渴粟殼斂肺澀腸固腎止嗽五味子收斂肺氣消嗽定喘白芍安脾肺固腠理收陰氣斂逆氣五倍子斂肺降火生津化痰本熱清之清熱不外瀉火潤燥前分虛實此分標本寒熱意各有注故藥味亦多重出清金清金不外滋陰降火甘寒苦寒隨虛實而用黃芩苦入心寒勝熱瀉上焦中焦實火知母苦寒瀉火麥冬甘寒潤肺梔子苦寒瀉心肺邪熱沙參甘寒補肺滋五臟之陰紫菀潤肺瀉火下氣調中天冬甘苦大寒清金降火本寒溫之金固畏火而性本寒冷過用清潤肺氣反傷故曰形寒飲冷則傷肺溫肺土為金母金惡燥而土惡濕清肺太過脾氣先傷則土不能生金故溫肺必先溫脾胃亦補母之義也丁香辛溫純陰泄肺溫胃藿香快氣和中開胃止嘔入手足太陰款冬花辛溫純陽溫肺理氣檀香調脾肺利胸膈引胃氣上升白豆蔻溫暖脾胃為肺家本藥益智仁燥脾胃補心腎砂仁和胃醒脾補肺益腎糯米甘溫補脾肺虛寒百部甘苦微溫潤肺殺蟲標寒散之不言標熱者肺主皮毛邪氣初入則寒猶未變為熱也解表表指皮毛屬太陽入肌膚則屬陽明入筋骨則屬少陽此解表解肌和解有淺深之不同也麻黃辛溫發汗肺家要藥蔥白外實中空肺之藥也發汗解肌通上下陽氣紫蘇發表散寒祛風定喘大腸經第二是經起於商陽穴終於迎香穴大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之間循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也經絡解大指次指者手大指之次指即第二指名食指也循指之指正次指也合谷虎口穴也肩端兩骨間為髃骨肩𩨹上際處為天柱骨缺盆足陽明胃經穴也頭莖為頸耳以下曲處為頰手陽明經之脈受手太陰之交遂起於次指之端循次指之商陽二間三間之上廉出合谷穴在兩骨之間又上陽谿穴即兩筋之間又循臂之上廉偏歷溫溜下廉上廉三里入肘外廉之曲池穴上循臑外之前廉歷肘髎五里臂臑以上肩之肩髃穴又出髃骨之前廉循巨骨穴上出天柱骨之會上會於大椎自大椎而下入缺盆循足陽明經脈外絡繞肺臟復下膈當天樞之外會屬於大腸其支者雖自偏歷而入又自缺盆上行於頸循天鼎扶突上貫於頰入下齒縫中復出夾口兩吻相交於人中之內左脈往右右脈往左上挾鼻孔循禾髎迎香而終以交於足陽明胃經也大腸經諸穴歌手陽明廿穴名循商陽二間三間而行歷合谷陽谿之俞過偏歷溫溜之濱下廉上廉三里而近曲池肘髎五里之程臂臑肩髃上於巨骨天鼎紆乎扶突禾髎唇連迎香鼻迫分寸歌商陽食指內側邊二間來尋本節前三間節後陷中取合谷虎口歧骨間陽谿上側腕中是偏歷腕後三寸安溫溜腕後去五寸池前五寸下廉看池前三寸上廉中池前二寸三里逢曲池屈骨紋頭盡肘髎大骨外廉近大筋中央尋五里肘上三寸行向里臂臑肘上七寸量肩髎肩端舉臂取巨骨肩尖端上行天鼎喉旁四寸真扶突天突旁五寸禾髎水溝旁五分迎香禾髎上一寸大腸經穴是分明病證解大腸主津液故言津液所生病上二證是本經自病下諸證或本經或合他經也皆未言及腑病舉例以概其餘也齒痛脈入齒縫也頸腫脈上行於頸也目黃合太陽少陽經病也口乾脈挾口也鼽衄脈挾鼻孔也喉嚨肺系臟腑相連也肩臑痛脈上肩臑也次指不用脈起於次指也實則熱腫虛則寒慄以寒熱分虛實也本草臟腑虛實標本用藥式大腸屬金主變化為傳送之官本病臟腑之病大便閉結泄痢下血裡急後重疽痔脫肛腸鳴而痛以上諸證或虛或實或寒或熱皆本腑病補經所未備標病經絡之病齒痛喉痹頸腫口乾俱同經咽中如梗咽非本經脈入缺盆循胃脈外近於咽鼽衄目黃手大指次指痛俱同經宿食發熱宿食在內發熱在外故為標病寒慄同經治法解腸實瀉之大腸主出糟粕邪氣有餘壅滯不通則為實故用瀉下分兩法熱熱結於腸大便不通寒以下之大黃盪滌腸胃下燥結去瘀熱芒硝潤燥軟堅盪滌實熱芫花盪滌留癖飲食寒熱邪氣牽牛瀉氣分濕熱通大腸氣秘巴豆開竅宣滯斬關奪門郁李仁下氣行水破血潤燥石膏清熱降火氣氣實則壅行氣破氣則滯自下枳殼破氣行痰消痞脹寬腸胃木香泄肺氣實大腸治瀉痢後重橘皮理氣燥濕下氣消痰檳榔瀉氣行痰攻堅去脹治大便氣秘腸虛補之大腸多氣多血氣血不足則虛故用補下分五法氣補氣不外下文升陽降濕二法此所謂氣疑指風言蓋風為陽氣善行空竅風氣入腸則為腸鳴瀉泄諸證故藥只舉皂莢一味正以其入腸而搜風也皂莢辛溫性燥入肺大腸搜風除濕燥燥屬血分金被火傷則血液枯燥養血所以潤燥也桃仁行血潤燥通大腸氣秘麻仁潤燥滑腸杏仁潤燥消積通大腸氣秘地黃瀉丙火清燥金補陰涼血乳香消氣活血通十二經松子治大便虛秘當歸補血潤燥滑大腸肉蓯蓉補精血滑大腸濕土為金母脾虛濕勝則水穀不分下滲於大腸而為瀉泄燥脾中之濕所以補母也白朮補脾燥濕蒼朮燥胃強脾除濕散郁半夏和胃健脾除濕化痰硫黃大熱純陽而疏利大腸治老人虛秘陷清氣在下則生飧泄胃中清陽之氣陷入下焦升而舉之如補中益氣升陽除濕之法是也升麻升陽氣於至陰引甘溫藥上行葛根輕揚升發能鼓胃氣上行脫下陷不已至於滑脫澀以止之所以收斂正氣也龍骨澀腸固精白堊澀腸止利訶子收脫止瀉澀腸斂肺粟殼斂肺澀腸烏梅斂肺澀腸白礬性澀而收燥濕止血赤石脂收濕止血固大小腸禹餘糧重澀固下石榴皮澀腸止利泄本熱寒之大腸屬金惡火肺火下移大腸每多無形之熱故宜寒之清熱實熱則瀉虛熱則清前言其實此言其虛省文也秦艽燥濕散風去腸胃熱槐角苦寒純陰涼大腸地黃瀉火清金涼血止血黃芩寒勝熱瀉肺火本寒溫之金寒水冷每多下利清穀故用溫溫里溫里亦所以補虛前補虛條中未之及亦省文也乾薑去臟腑沉寒痼冷附子大熱純陽通十二經絡治一切沉寒肉果澀大腸止冷痢虛瀉標熱散之不言標寒者邪入陽明已變為熱且手陽明經脈在上非寒邪所幹解肌陽明主肌肉已非在表不可發汗第用解肌之法石膏體重瀉火氣輕解肌白芷散風除濕通竅表汗為陽明主藥升麻表散風邪亦入手陽明葛根開腠發汗解肌退熱胃經第三是經起於頭維穴終於厲兌穴胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中趾內間其支者下廉三寸而別下入中趾外間其支者別跗上入大趾間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則𠺕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中趾不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒慄胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也經絡解頞鼻莖也腮下為頷頷中為頤腮前為髮際髮際前為額顱股內為髀髀前膝上起肉處為伏兔伏兔後為髀關挾膝筋中為臏脛骨為骭足面為跗足陽明受手陽明之交起於鼻之兩旁迎香穴上行而左右相交於頞中過太陽睛明之分下循鼻外歷承泣四白巨髎上入齒中還出挾口兩吻地倉環繞唇下左右相交於承漿卻循頤後下廉出大迎循頰車上耳前歷下關過客主人循髮際經頭維會於額顱之神庭其支者從大迎前下人迎循喉嚨歷水突氣舍入缺盆行足少陰俞府之外下膈當上脘中脘之分屬胃絡脾其直行者從缺盆而下下乳內廉循氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉門下挾臍歷天樞外陵大巨水道歸來諸穴而入氣街中其支者自屬胃處起胃下口循腹裡過足少陰肓俞之外本經之裡下氣街中與前之入氣街者合乃下髀關抵伏兔歷陰市梁丘下入膝臏中經犢鼻下循足面之衝陽陷谷入中趾外間之內庭至厲兌穴而終也其支別者自膝下三寸循三里穴之外別下歷上廉條口下廉豐隆解谿衝陽陷谷以至內庭厲兌而合也又其支者別跗上衝陽穴別行入大趾間出足厥陰行間穴之外循大趾下出其端以交於足太陰也胃之經脈有二一上行至頭一下行至足絡脈有四伏行胸腹者二旁行脛足者二其實上下二脈雖不同行而中有絡脈以相連貫則仍一脈也伏行二絡一起於胃一止於胃仍是一脈至氣街而合行於脛足絡與經又仍一脈也下二絡一交於太陰一旋分而旋合其旁行之路雖殊而結穴正自井然也胃經諸穴歌足陽明四十五自承泣四白而數巨髎有地倉之積大迎乘頰車之夥下關頭維及人迎水突氣舍與缺盆氣戶兮庫房屋翳膺窗兮乳中乳根不容承滿梁門關門太乙滑肉天樞外陵大巨從水道歸來氣街入髀關之境伏兔至陰市梁丘犢鼻目三里而行上巨虛兮條口下巨虛兮豐隆解谿衝陽入陷谷下內庭厲兌而終分寸歌胃之經兮足陽明承泣目下七分尋四白目下方一寸巨髎鼻孔旁八分地倉夾吻四分迎大迎頷下寸三分頰車耳下八分穴下關耳前動脈行頭維神庭旁四五人迎喉旁寸五真水突筋前迎下在氣舍突下穴相乘缺盆舍下橫骨內各去中行寸半明氣戶璇璣旁四寸至乳六寸又四分庫房屋翳膺窗近乳中正在乳頭心次有乳根出乳下各一寸六不相侵卻去中行須四寸以前穴道與君陳不容巨闕旁三寸卻近幽門寸五新其下承滿與梁門關門太乙滑肉門上下一寸無多少共去中行三寸尋天樞臍旁二寸間樞下一寸外陵安樞下二寸大巨穴樞下四寸水道全樞下六寸歸來好共去中行二寸邊氣街鼠鼷上一寸又去中行四寸專髀關膝上有尺二伏兔膝上六寸是陰市膝下方三寸梁丘膝上二寸記膝臏陷中犢鼻存膝下三寸三里至膝下六寸上廉穴膝下七寸條口位膝下八寸下廉看膝下九寸豐隆系卻是踝上八寸量比那下廉外邊綴解谿去庭六寸半衝陽庭後五寸換陷谷庭後二寸間內庭次趾外間現厲兌大趾次趾端去爪如韭胃並判病證解陽明多氣多血曰血所生病舉血以概氣也振寒所謂寒慄鼓頷經病也善呻數欠腑病也顏黑脈起於面經病也惡人與火胃熱盛也聞木音而驚土畏木也閉戶獨處陰薄陽也上高而歌陽盛則四支實也棄衣而走熱盛於身也賁響腹脹火盛與水相激也皆腑病也骭厥脈行於骭經病也以上皆本經自病也狂胃熱乘心與上登高棄衣同瘧兼少陽病也溫淫汗出胃主肌肉內熱則腠理開也鼽衄脈行鼻外也口喎脈挾口也唇胗脈環唇也頸腫脈循頤出大迎也喉痹脈循喉嚨也大腹水腫脈循腹裡也膝臏腫痛以下皆經脈所行之地以上本經病居多或合他經而並見也身前寒熱脈行於身之前也消穀脹滿腑病也溺色黃胃熱下入膀胱也其有未備者另詳本草中本草臟腑虛實標本用藥式胃屬土主容受為水穀之海本病臟腑之病噎膈反胃有火則噎膈無火則反胃中滿腫脹同經嘔吐聲物俱出胃寒熱皆然瀉痢濕熱下行於腸霍亂腹痛脾胃俱病消中善飢同經不消食脾不為胃用傷飲食胃病累脾胃管當心痛支兩脅木剋土兼少陽病也標病經絡之病發熱蒸蒸身前熱身後寒同經發狂譫語必兼登高棄衣諸證身熱四肢實故屬標病咽痹咽胃系也上齒痛脈入齒口眼喎斜脈挾口且過睛明穴也鼻痛鼽衄同經赤皶脈起交頞治法解胃實瀉之胃主容受然太實則中焦阻塞上下不通故用瀉下分二法濕熱熱盛則濕者化而為燥故用下法大黃盪滌腸胃下燥結去瘀熱芒硝潤燥軟堅盪滌腸胃飲食重者用下輕者用消巴豆去臟腑沉寒下冷積神麯化水穀消積滯山楂消食磨積化油膩滯阿魏入脾胃消肉積硇砂消食破瘀治肉積鬱金下氣破血三稜破血消積輕粉劫痰涎消積滯胃虛補之土喜沖和或熱或寒皆傷正氣耗津液故用補下分二法濕熱氣虛濕勝濕勝熱生去濕即所以去熱熱去而正氣自生蒼朮燥胃除濕白朮燥濕和中半夏除濕化痰茯苓滲濕行水橘皮導滯消痰生薑調中暢胃開痰下食寒濕脾中之陽氣不足則胃中之津液不行補陽乃以健脾亦以燥胃故寒去而濕出乃能上輸津液灌溉周身乾薑逐寒邪燥脾濕除胃冷附子補真陽逐寒濕草果健脾暖胃燥濕祛寒官桂補命門火抑肝扶脾丁香溫胃補腎肉果理脾暖胃逐冷祛痰人參補陽氣扶脾土黃耆補中益氣壯脾強胃本熱寒之不言本寒者治寒濕之法已見上條也降火土生於火火太過則土焦降心火乃以清胃熱石膏足陽明經大寒之藥地黃苦寒入心瀉丙火犀角瀉心火清胃熱黃連瀉心火厚腸胃標熱解之邪入陽明則病在肌肉寒變為熱故不言標寒解肌陽明主肌肉邪及肌肉已不在表故用解不用發升麻表散風寒足陽明引經藥葛根入陽明經開腠發汗豆豉發汗解肌調中下氣脾經第四是經起於隱白穴終於大包穴脾足太陰之脈起於大趾之端循趾內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也經絡解核骨足大趾本節後內側圓骨也腓腹為踹髀內為股臍上為腹咽胃系也舌本舌根也足太陰脾受足陽明之交起於足大趾端之隱白穴循趾內側白肉際大都穴過核骨後歷太白公孫商丘上內踝前廉之三陰交上踹內循䯒骨後之漏谷上行交出足厥陰之前至地機陰陵泉上循膝股前廉之血海箕門迤邐入腹經衝門府舍復循腹結大橫會下脘歷腹哀過期門之分循本經之裡下至中脘之際以屬脾絡胃又由腹哀上膈循食竇天溪胸鄉周榮曲折向下至大包又自大包外曲折向上會中府上行人迎之裡挾喉連舌本散舌下而終其支者由腹哀穴別行再從胃部中脘穴之外上膈注於膻中之裡心之分以交於手少陰心經也脾經諸穴歌足太陰脾中州二十一穴隱白遊赴大都兮瞻太白訪公孫兮至商丘越三陰之交而漏谷地機可即步陰陵之泉而血海箕門是求入衝門兮府舍軒豁解腹結兮大橫優遊腹哀食竇兮接天溪而同派胸鄉周榮兮綴大包而如鉤分寸歌大趾內側起隱白節後陷中求大都太白內側核骨下節後一寸公孫呼商丘內踝陷中遭踝上三寸三陰交踝上六寸漏谷是踝上五寸地機朝膝下內側陰陵泉血海膝臏上內廉箕門穴在魚腹取動脈應手越筋間衝門期下尺五分府舍期下九寸判腹結期下六寸八大橫期下五寸半腹哀期下方二寸期門肝經穴道現巨闕之旁四寸五卻連脾穴休胡亂自此以上食竇穴天溪胸鄉周榮貫相去寸六無多寡又上寸六中府換大包腋下有六寸淵液腋下三寸絆病證解舌本強脈連舌本也食則嘔脾不能化食也胃脘痛脈絡胃也腹脹脈入腹也善噫脾氣厥逆於胃也得後與氣則快脾氣下泄也身體重脾主肌肉也以上或經病或絡病或臟病皆脾經自病也舌本痛甚於強也體不能動甚於重也食不下不但嘔也心煩心痛脈注心中亦合心經病也溏瘕泄脾不實也水閉脾病連腎也黃疸脾病本色外現也不能臥腎病干脾也強立股膝腫足大趾不用皆經病以上合病也不言氣盛氣虛省文也本草臟腑虛實標本用藥式脾藏志屬土為萬物之母主營衛主味主肌肉主四肢本病臟腑之病諸濕腫脹痞滿即經中腹脹得後與氣則快不能臥食不下諸證噫氣同經大小便閉即水閉黃疸同經痰飲脾不為胃行津液吐瀉霍亂脾胃同病心腹痛同經飲食不化脾不健運標病經絡之病身體膚腫重困嗜臥同經四肢不舉脾主四肢舌本強痛足大趾不用同經九竅不通脾為萬物母主營衛脾病則諸臟俱病九竅在外故為標病諸痙項強脈行人迎挾喉治法解土實瀉之脾胃俱為倉廩之官而脾主運化脾氣太實則中央杼軸不靈故用瀉下分三法瀉子金為土之子土滿則肺氣壅遏瀉肺氣所以消滿訶子泄氣消痰開胃調中防風瀉肺散頭目滯氣桑皮瀉肺行水下氣消痰葶藶下氣行水大能瀉肺吐經云在上者因而越之痰血食積壅塞上焦湧而去之其勢最便故用吐法胃實不言吐者胃主容受脾主消化積雖在胃而病生於脾也豆豉能升能散得鹽則吐梔子苦寒瀉火吐虛煩客熱蘿蔔子長於利氣能吐風痰常山引吐行水祛老痰積飲瓜蒂吐風熱痰涎上膈宿食鬱金行氣破血輕揚上行同升麻服能吐齏汁吐諸痰飲宿食藜蘆吐上膈風涎苦參瀉火燥濕祛風逐水赤小豆行水散血清熱解毒鹽湯能湧吐苦茶瀉熱清痰下氣消食濃茶能引吐下下法不止去結除熱凡驅逐痰水皆是也蓋脾惡濕脾病則濕勝土不足以制水每生積飲之證故與腸胃三焦下熱結之法稍異大黃瀉血分實熱下有形積滯芒硝盪滌實熱推陳致新青礞石體重沉墜下氣利痰大戟瀉臟腑水濕續隨子下積飲治水氣芫花去水氣消痰癖甘遂瀉隧道水濕土虛補之土為萬物之母而寄旺於四時土虛則諸臟無所稟承故用補下分三法補母土生於火益心火所以生脾土也桂心苦入心經益陽消陰茯苓安心益氣助陽補脾氣氣屬陽陽氣旺則濕不停而脾能健運人參大補元氣益土生金黃耆補中氣壯脾胃升麻升陽氣補衛氣脾胃引經藥葛根升胃氣兼入脾經甘草補脾胃不足陳皮調中快膈脾胃氣分之藥藿香入脾經去惡氣葳蕤補中益氣治風濕砂仁和胃醒脾快氣調中木香疏肝和脾三焦氣分藥扁豆調脾暖胃消暑除濕血脾統血喜溫而惡寒寒濕傷脾則氣病而血亦病甘溫益脾則陽能生陰所以和血而補血也與他臟養血之法不同白朮甘溫和中同血藥用則補血蒼朮甘溫辛烈燥胃強脾白芍瀉肝安脾為太陰行經藥膠飴溫補脾甘緩中大棗甘溫補中入脾經血分乾薑辛溫燥濕能引血藥入氣分而生血木瓜伐肝理脾調營衛利筋骨烏梅酸澀而溫脾肺血分之藥蜂蜜甘溫補中調和營衛本濕除之不言寒熱者實兼寒熱也下分二法燥中宮脾惡濕燥濕所以健脾脾喜溫故只言寒濕不言濕熱且濕去而熱自除也白朮苦燥濕蒼朮除寒濕橘皮理氣燥濕半夏除濕化痰吳茱萸燥脾除濕南星燥濕除痰白芥子溫中開胃利氣豁痰潔淨府水乃濕之原行水乃以除濕故治濕必利小便木通通膀胱導濕熱赤茯苓利濕熱赤勝於白豬苓利濕行水藿香去惡氣則正氣通暢氣化則小便利標濕滲之脾之經絡受傷者不止於濕外感之濕中人不止脾之一經脾專言濕舉一以概其餘也以濕屬脾從其類也開鬼門濕從汗解風能燥濕葛根解肌開腠蒼朮發汗除濕麻黃辛溫發汗獨活搜風去濕以上所舉四藥或入陽明或入太陽或入少陰非專入脾經也蓋濕與熱合傷在肌肉則用陽明藥濕與風合傷在皮膚則用太陽藥濕與寒合傷在筋骨則用少陰藥濕土於五行寄旺故兼諸經藥也推之他經濕在太陽則用麻黃濕在陽明則用葛根蒼朮濕在少陰則用獨活觸類引伸方得作者本旨不可泥看余仿此心經第五是經起於極泉穴終於少衝穴心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小於人迎也經絡解心系有二其一上通於肺其一由肺葉而下曲折向後並脊裡細絡相連與腎相通正當七節之間蓋心通五臟系也手腕下胛為銳骨手少陰經受足太陰脾之交起於心循任脈之外屬心系下膈當臍上二寸之分絡小腸其支者從心系出任脈之外上行而挾咽系目系以上二脈一下行一上行皆伏行於內者也其直者出行於外亦經脈也從心系上至肺臟之分出循腋下抵極泉穴自極泉下循臑內後廉行手太陰心主兩經之後歷青靈穴下肘內廉抵少海自少海而下循臂內後廉歷靈道通里至掌後銳骨之端經陰郄神門入掌內廉至少府循小指端之少衝而終以交於手太陽小腸蓋心為君主之官尊於他臟故其交經授受不假支別云心經諸穴歌手少陰九穴成極泉青靈少海深自靈道通里而達過陰郄神門而迎抵於少府少衝可尋分寸歌少陰心起極泉中腋下筋間脈入胸青靈肘上三寸取少海肘後五分容靈道掌後一寸半通里腕後一寸同陰郄腕後方半寸神門掌後銳骨隆少府節後勞宮直小指內側取少衝病證解嗌乾脈上行挾嗌也心痛本臟之腑其餘心痛皆包絡痛也渴而欲飲心火內炎也目黃脈系目系也脅痛脈出腋下也臑臂後廉痛脈循臑臂後廉也掌中熱痛脈入掌內也心為五臟之主邪不能幹除真心痛外所載皆經絡中病此下即有本病亦包絡之病非本臟病也況經絡相連病證多同故內經雖各詳經絡而本草所載兩經合一今遵內經仍各分一經至於標本用藥俱載包絡經中心經不必另載小腸經第六是經起於少澤穴終於聽宮穴小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也經絡解腕下兌骨為踝脊兩旁為膂膂上兩角為肩解肩解下成片骨為肩胛目外角為銳眥目下為䪼目內角為內眥手太陽受手少陰心經之交脈起於小指少澤穴穴由是循外側之前谷後谿上腕出踝中歷腕骨陽谷養老穴直上循臂骨下廉支正出肘內側兩筋之間歷小海穴上循臑外廉行手陽明少陽之外上肩循肩貞臑俞天宗秉風曲垣肩外俞肩中俞諸穴乃上會大椎左右相交於兩肩之上自交肩下入缺盆循肩向腋下行當膻中之分絡心循胃系下膈過上脘抵胃下行任脈之外當臍上二寸之分屬小腸其支者從缺盆循頸之天窗天容上頰抵顴髎上至目銳眥過瞳子髎卻入耳中循聽宮而終其支者循頰上䪼抵鼻至目內眥睛明穴以斜絡於顴而交於足太陽經也小腸經諸穴歌小腸穴十九中路從少澤步前谷後谿之隆道遵腕骨觀陽谷養老之崇得支正於小海逐肩貞以相從值臑俞兮過天宗乘秉風兮曲垣中肩外俞兮肩中俞啟天窗兮見天容匪由顴髎曷造聽宮分寸歌小指端外為少澤前谷外側節前覓節後捏拳取後谿腕骨腕前骨陷側兌骨下陷陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞胛下兩骨解臑俞大骨下陷保天宗秉風后骨中秉風髎外舉有空曲垣肩中曲胛陷外俞胛後一寸從肩中二寸大杼旁天窗扶突後陷詳天容耳下曲頰後顴髎面頄銳端量聽宮耳端大如菽此為小腸手太陽病證解嗌痛脈循胃系也頷腫脈循頸上頰也肩痛脈出肩解也臑難舉脈循臑也耳聾脈入耳也目黃脈入內外眥也頰腫頸頷肩臑肘臂外後廉痛皆經脈所過之地以上言經病未言腑病言本經病未言合病然亦可類推也本草臟腑虛實標本用藥式小腸主分泌水穀為受盛之官本病臟腑之病大便水穀利小便短小便閉小便血小便自利大便後血大腸主大便膀胱主小便而小腸兼主大小便以分泌水穀也小腸氣痛本腑病宿食夜熱旦止以小腸為受盛之官標病經絡之病身熱惡寒手足太陽病同嗌痛頷腫同經口糜合胃經病以脈循胃系也耳聾同經治法解實熱瀉之小腸承胃之下脘而下輸膀胱大腸實熱則不能泌別清濁故用瀉下分二法氣氣分有熱則水穀不分行水即以導熱木通通大小腸導諸濕熱豬苓利濕利水滑石利竅滲濕瀉熱行水瞿麥降心火利小腸行水破血澤瀉利濕行水燈草降心火利小腸血熱入血分則血妄行清熱所以涼血止血地黃瀉丙火涼血生血蒲黃生行血熟止血赤茯苓入心小腸利濕熱梔子瀉心肺邪熱下從小便出丹皮瀉血中伏火涼血而生血虛寒補之小腸屬火化物出焉虛寒則失其職故用補下分二法氣胃為小腸上流胃氣虛則濕流小腸而水穀不分調補胃氣即以補小腸之氣也白朮燥濕和中益陽補氣楝實導小腸熱引心包相火下行茴香開胃調中療小腸冷氣砂仁快氣調中通行結滯入大小腸神麯調中開胃化水穀消積滯扁豆調脾暖胃消暑除濕血血分寒虛則多凝滯補陽行氣所以活血而補血也桂心辛走血能補陽活血胡索行血中氣滯氣中血滯本熱寒之不言本寒者虛寒已見上條省文也降火小腸與心為表裡心火太旺往往下傳於小腸降心火所以清小腸之上流也黃柏瀉相火補腎水黃芩苦入心寒勝熱黃連大苦大寒入心瀉火連翹形似心入心經氣分而瀉火梔子瀉心肺三焦之火標熱散之陽邪中上陰邪中下手太陽經脈在上非寒邪所能幹故止言標熱解肌陽邪每多自汗之證故不用發表且小腸經專主上部與足陽明解肌不同藁本辛溫雄壯為太陽風藥羌活搜風發表防風解表去風主上焦風邪蔓荊輕浮升散主上部風邪
