body:
  text: 卷首十二經絡圖象手太陰肺經圖肺臟圖肺重三斤三兩六葉兩耳凡八葉附脊第三椎考尺寸斤兩升斗古今異同古之一尺與今之木工曲尺相等古之一兩今之七分六釐古之一升今之六勺七抄余仿此手陽明大腸經圖大腸腑圖大腸重三斤十二兩長二丈一尺廣四寸徑寸半當臍右回疊積十六曲盛谷一斗水七升半大腸上口即小腸下口足陽明胃經圖胃腑圖胃重二斤十四兩紆曲屈伸長二尺六寸大一尺五寸徑五寸容谷二斗水一斗五升足太陰脾經圖脾臟圖脾重二斤二兩扁廣三寸長五寸有散膏半斤手少陰心經圖心臟圖心形如未敷蓮花重十二兩中有七孔三毛盛精汁三合附脊第五椎手太陽小腸經圖小腸腑圖小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲容谷二斗四升水六升三合合之大半足太陽膀胱經圖膀胱腑圖膀胱重九兩二銖縱廣九寸盛溺九升九合廣二寸半膀胱有下口無上口上系小腸津溺由小腸下焦滲入足少陰腎經圖腎臟圖腎有兩枚形如豇豆重一斤一兩附脊十四椎當臍下兩旁前後與臍平心包絡經圖心包絡腑圖心包絡即膻中宜配心臟脈訣配諸尺中應心主而為相火誤矣內經昭然三焦經圖三焦腑圖足少陽膽經圖膽腑圖膽在肝之短葉間重三兩三銖藏精汁三合狀如瓶足厥陰肝經圖肝臟圖肝重四斤四兩左三葉右四葉凡七葉附脊第九椎
